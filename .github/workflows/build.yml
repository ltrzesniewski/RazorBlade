
name: Build
on: [push, pull_request]

env:
  DOTNET_NOLOGO: 1
  NUGET_CERT_REVOCATION_MODE: offline
  BUILD_DOTNET_VERSION: |
    6.0.x
    8.0.x
    10.0.x

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.BUILD_DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/RazorBlade.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore src/RazorBlade.slnx

      - name: Pack
        run: dotnet pack --configuration Release --no-build src/RazorBlade.slnx

      - name: Test
        run: dotnet test --configuration Release --no-build src/RazorBlade.slnx

      - name: Integration Test
        run: dotnet publish --configuration Release --no-build --output ./bin/aot src/RazorBlade.IntegrationTest/RazorBlade.IntegrationTest.csproj && ./bin/aot/RazorBlade.IntegrationTest.exe --aot

      - name: Upload NuGet
        uses: actions/upload-artifact@v7
        with:
          name: NuGet
          path: output/*.nupkg
          archive: false
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.BUILD_DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/RazorBlade.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore src/RazorBlade.slnx

      - name: Test
        run: dotnet test --configuration Release --no-build src/RazorBlade.slnx

      - name: Integration Test
        run: dotnet publish --configuration Release --no-build --output ./bin/aot src/RazorBlade.IntegrationTest/RazorBlade.IntegrationTest.csproj && ./bin/aot/RazorBlade.IntegrationTest --aot
